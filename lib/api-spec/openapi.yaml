openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Clinic Launch OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Clinic launch projects
  - name: properties
    description: Clinic properties under evaluation
  - name: phases
    description: Project phases
  - name: tasks
    description: Project tasks within phases
  - name: cost_items
    description: Line-item cost breakdowns per task
  - name: scenario_configs
    description: Named financial scenario configurations per project
  - name: financials
    description: Financial models
  - name: dashboard
    description: Dashboard summary data
  - name: intelligence
    description: AI-powered property intelligence and document extraction
  - name: decisions
    description: Strategic decision log entries
  - name: optimisation
    description: Cost variance optimisation analysis
  - name: compliance
    description: CQC registration and clinical compliance tracker
  - name: suppliers
    description: Supplier and procurement quote management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Projects
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Properties
  /projects/{projectId}/properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List properties for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicProperty"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Created property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"
    put:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyBody"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Phases
  /projects/{projectId}/phases:
    get:
      operationId: listPhases
      tags: [phases]
      summary: List phases for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LaunchPhase"
    post:
      operationId: createPhase
      tags: [phases]
      summary: Create a phase
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhaseBody"
      responses:
        "201":
          description: Created phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPhase"

  /phases/{id}:
    put:
      operationId: updatePhase
      tags: [phases]
      summary: Update a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePhaseBody"
      responses:
        "200":
          description: Updated phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPhase"
    delete:
      operationId: deletePhase
      tags: [phases]
      summary: Delete a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Tasks
  /phases/{phaseId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for a phase
      parameters:
        - name: phaseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LaunchTask"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      parameters:
        - name: phaseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchTask"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchTask"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchTask"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Cost Items
  /tasks/{taskId}/cost-items:
    get:
      operationId: listCostItems
      tags: [cost_items]
      summary: List cost items for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of cost items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostItem"
    post:
      operationId: createCostItem
      tags: [cost_items]
      summary: Create a cost item
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostItemBody"
      responses:
        "201":
          description: Created cost item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"

  /cost-items/{id}:
    put:
      operationId: updateCostItem
      tags: [cost_items]
      summary: Update a cost item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCostItemBody"
      responses:
        "200":
          description: Updated cost item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"
    delete:
      operationId: deleteCostItem
      tags: [cost_items]
      summary: Delete a cost item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Scenario Configs
  /projects/{projectId}/scenario-configs:
    get:
      operationId: listScenarioConfigs
      tags: [scenario_configs]
      summary: List scenario configs for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of scenario configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScenarioConfig"
    post:
      operationId: createScenarioConfig
      tags: [scenario_configs]
      summary: Create a scenario config
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScenarioConfigBody"
      responses:
        "201":
          description: Created scenario config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioConfig"

  /scenario-configs/{id}:
    put:
      operationId: updateScenarioConfig
      tags: [scenario_configs]
      summary: Update a scenario config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScenarioConfigBody"
      responses:
        "200":
          description: Updated scenario config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioConfig"
    delete:
      operationId: deleteScenarioConfig
      tags: [scenario_configs]
      summary: Delete a scenario config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Fixed Monthly Cost Items
  /projects/{projectId}/fixed-cost-items:
    get:
      operationId: listFixedCostItems
      tags: [financials]
      summary: List dynamic fixed monthly cost items for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of fixed cost items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixedCostItem"
    post:
      operationId: createFixedCostItem
      tags: [financials]
      summary: Create a fixed monthly cost item
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFixedCostItemBody"
      responses:
        "201":
          description: Created fixed cost item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixedCostItem"

  /fixed-cost-items/{id}:
    put:
      operationId: updateFixedCostItem
      tags: [financials]
      summary: Update a fixed monthly cost item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFixedCostItemBody"
      responses:
        "200":
          description: Updated fixed cost item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixedCostItem"
    delete:
      operationId: deleteFixedCostItem
      tags: [financials]
      summary: Delete a fixed monthly cost item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Financial Models
  /projects/{projectId}/financial:
    get:
      operationId: getFinancialModel
      tags: [financials]
      summary: Get financial model for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Financial model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
    put:
      operationId: upsertFinancialModel
      tags: [financials]
      summary: Create or update financial model
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertFinancialModelBody"
      responses:
        "200":
          description: Financial model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
    delete:
      operationId: deleteFinancialModel
      tags: [financials]
      summary: Delete financial model for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/financial/calculate:
    post:
      operationId: calculateFinancials
      tags: [financials]
      summary: Calculate financial outputs for a given scenario
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateFinancialsBody"
      responses:
        "200":
          description: Calculated financial outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialCalculation"

  # Burndown
  /projects/{projectId}/burndown:
    get:
      operationId: getProjectBurndown
      tags: [dashboard]
      summary: Get task completion burndown data for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Burndown data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BurndownPoint"

  # Dashboard
  /projects/{projectId}/dashboard:
    get:
      operationId: getProjectDashboard
      tags: [dashboard]
      summary: Get dashboard summary for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /projects/{projectId}/risk-flags:
    get:
      operationId: getRiskFlags
      tags: [dashboard]
      summary: Get risk flags for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Risk flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskFlag"

  /properties/{id}/upload-document:
    post:
      operationId: uploadPropertyDocument
      tags: [intelligence]
      summary: Upload a PDF document and extract property fields via AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Extracted property fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyExtraction"

  /properties/{id}/competitors:
    put:
      operationId: setPropertyCompetitors
      tags: [intelligence]
      summary: Replace the full list of manually-entered competitors for a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ManualCompetitor"
      responses:
        "200":
          description: Updated competitors list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManualCompetitor"

  # Decisions
  /projects/{projectId}/decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List decisions for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
    post:
      operationId: createDecision
      tags: [decisions]
      summary: Create a decision
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDecisionBody"
      responses:
        "201":
          description: Created decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"

  /decisions/{id}:
    put:
      operationId: updateDecision
      tags: [decisions]
      summary: Update a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDecisionBody"
      responses:
        "200":
          description: Updated decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
    delete:
      operationId: deleteDecision
      tags: [decisions]
      summary: Delete a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Compliance
  /projects/{projectId}/compliance/items:
    get:
      operationId: listComplianceItems
      tags: [compliance]
      summary: List compliance checklist items for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of compliance items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceItem"
    post:
      operationId: createComplianceItem
      tags: [compliance]
      summary: Create a compliance item
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplianceItemBody"
      responses:
        "201":
          description: Created compliance item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceItem"

  /compliance/items/{id}:
    put:
      operationId: updateComplianceItem
      tags: [compliance]
      summary: Update a compliance item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplianceItemBody"
      responses:
        "200":
          description: Updated compliance item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceItem"
    delete:
      operationId: deleteComplianceItem
      tags: [compliance]
      summary: Delete a compliance item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/compliance/summary:
    get:
      operationId: getComplianceSummary
      tags: [compliance]
      summary: Get compliance readiness summary for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Compliance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceSummary"

  /projects/{projectId}/compliance/milestones:
    get:
      operationId: listCqcMilestones
      tags: [compliance]
      summary: List CQC registration milestones for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of CQC milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CqcMilestone"
    post:
      operationId: createCqcMilestone
      tags: [compliance]
      summary: Create a CQC milestone for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCqcMilestoneBody"
      responses:
        "201":
          description: Created milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CqcMilestone"

  /compliance/milestones/{id}:
    put:
      operationId: updateCqcMilestone
      tags: [compliance]
      summary: Update a CQC milestone status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCqcMilestoneBody"
      responses:
        "200":
          description: Updated milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CqcMilestone"
    delete:
      operationId: deleteCqcMilestone
      tags: [compliance]
      summary: Delete a CQC milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Cost Optimisation Rules
  /projects/{projectId}/cost-optimisation-rules:
    get:
      operationId: listCostOptimisationRules
      tags: [optimisation]
