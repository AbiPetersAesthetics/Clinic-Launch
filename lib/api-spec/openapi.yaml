openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Clinic Launch OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Clinic launch projects
  - name: properties
    description: Clinic properties under evaluation
  - name: phases
    description: Project phases
  - name: tasks
    description: Project tasks within phases
  - name: cost_items
    description: Line-item cost breakdowns per task
  - name: scenario_configs
    description: Named financial scenario configurations per project
  - name: financials
    description: Financial models
  - name: dashboard
    description: Dashboard summary data
  - name: intelligence
    description: AI-powered property intelligence and document extraction
  - name: decisions
    description: Strategic decision log entries
  - name: optimisation
    description: Cost variance optimisation analysis

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Projects
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Properties
  /projects/{projectId}/properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List properties for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicProperty"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Created property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"
    put:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyBody"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Phases
  /projects/{projectId}/phases:
    get:
      operationId: listPhases
      tags: [phases]
      summary: List phases for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LaunchPhase"
    post:
      operationId: createPhase
      tags: [phases]
      summary: Create a phase
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhaseBody"
      responses:
        "201":
          description: Created phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPhase"

  /phases/{id}:
    put:
      operationId: updatePhase
      tags: [phases]
      summary: Update a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePhaseBody"
      responses:
        "200":
          description: Updated phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPhase"
    delete:
      operationId: deletePhase
      tags: [phases]
      summary: Delete a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Tasks
  /phases/{phaseId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for a phase
      parameters:
        - name: phaseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LaunchTask"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      parameters:
        - name: phaseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchTask"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchTask"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchTask"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Cost Items
  /tasks/{taskId}/cost-items:
    get:
      operationId: listCostItems
      tags: [cost_items]
      summary: List cost items for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of cost items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostItem"
    post:
      operationId: createCostItem
      tags: [cost_items]
      summary: Create a cost item
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostItemBody"
      responses:
        "201":
          description: Created cost item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"

  /cost-items/{id}:
    put:
      operationId: updateCostItem
      tags: [cost_items]
      summary: Update a cost item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCostItemBody"
      responses:
        "200":
          description: Updated cost item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"
    delete:
      operationId: deleteCostItem
      tags: [cost_items]
      summary: Delete a cost item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Scenario Configs
  /projects/{projectId}/scenario-configs:
    get:
      operationId: listScenarioConfigs
      tags: [scenario_configs]
      summary: List scenario configs for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of scenario configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScenarioConfig"
    post:
      operationId: createScenarioConfig
      tags: [scenario_configs]
      summary: Create a scenario config
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScenarioConfigBody"
      responses:
        "201":
          description: Created scenario config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioConfig"

  /scenario-configs/{id}:
    put:
      operationId: updateScenarioConfig
      tags: [scenario_configs]
      summary: Update a scenario config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScenarioConfigBody"
      responses:
        "200":
          description: Updated scenario config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioConfig"
    delete:
      operationId: deleteScenarioConfig
      tags: [scenario_configs]
      summary: Delete a scenario config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Financial Models
  /projects/{projectId}/financial:
    get:
      operationId: getFinancialModel
      tags: [financials]
      summary: Get financial model for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Financial model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
    put:
      operationId: upsertFinancialModel
      tags: [financials]
      summary: Create or update financial model
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertFinancialModelBody"
      responses:
        "200":
          description: Financial model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
    delete:
      operationId: deleteFinancialModel
      tags: [financials]
      summary: Delete financial model for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/financial/calculate:
    post:
      operationId: calculateFinancials
      tags: [financials]
      summary: Calculate financial outputs for a given scenario
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateFinancialsBody"
      responses:
        "200":
          description: Calculated financial outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialCalculation"

  # Burndown
  /projects/{projectId}/burndown:
    get:
      operationId: getProjectBurndown
      tags: [dashboard]
      summary: Get task completion burndown data for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Burndown data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BurndownPoint"

  # Dashboard
  /projects/{projectId}/dashboard:
    get:
      operationId: getProjectDashboard
      tags: [dashboard]
      summary: Get dashboard summary for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /projects/{projectId}/risk-flags:
    get:
      operationId: getRiskFlags
      tags: [dashboard]
      summary: Get risk flags for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Risk flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskFlag"

  /properties/{id}/upload-document:
    post:
      operationId: uploadPropertyDocument
      tags: [intelligence]
      summary: Upload a PDF document and extract property fields via AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Extracted property fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyExtraction"

  /properties/{id}/competitors:
    put:
      operationId: setPropertyCompetitors
      tags: [intelligence]
      summary: Replace the full list of manually-entered competitors for a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ManualCompetitor"
      responses:
        "200":
          description: Updated competitors list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManualCompetitor"

  # Decisions
  /projects/{projectId}/decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List decisions for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
    post:
      operationId: createDecision
      tags: [decisions]
      summary: Create a decision
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDecisionBody"
      responses:
        "201":
          description: Created decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"

  /decisions/{id}:
    put:
      operationId: updateDecision
      tags: [decisions]
      summary: Update a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDecisionBody"
      responses:
        "200":
          description: Updated decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
    delete:
      operationId: deleteDecision
      tags: [decisions]
      summary: Delete a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Cost Optimisation Rules
  /projects/{projectId}/cost-optimisation-rules:
    get:
      operationId: listCostOptimisationRules
      tags: [optimisation]
      summary: List cost optimisation rules for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of cost optimisation rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostOptimisationRule"
    post:
      operationId: createCostOptimisationRule
      tags: [optimisation]
      summary: Create a cost optimisation rule
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostOptimisationRuleBody"
      responses:
        "201":
          description: Created cost optimisation rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostOptimisationRule"

  /cost-optimisation-rules/{id}:
    put:
      operationId: updateCostOptimisationRule
      tags: [optimisation]
      summary: Update a cost optimisation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCostOptimisationRuleBody"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostOptimisationRule"
    delete:
      operationId: deleteCostOptimisationRule
      tags: [optimisation]
      summary: Delete a cost optimisation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Optimisation
  /projects/{projectId}/optimisation-analysis:
    get:
      operationId: getOptimisationAnalysis
      tags: [optimisation]
      summary: Get cost variance optimisation analysis for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Optimisation analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimisationAnalysis"

  /properties/{id}/analyse:
    post:
      operationId: analyseProperty
      tags: [intelligence]
      summary: Run full AI property intelligence analysis (persisted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                searchRadiusMeters:
                  type: integer
                  description: Radius in metres for Google Places competitor search (default 600, min 200, max 2000)
                  minimum: 200
                  maximum: 2000
                  default: 600
      responses:
        "200":
          description: Full property intelligence result (persisted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyIntelligenceResult"

  /properties/{id}/analyses:
    get:
      operationId: listPropertyAnalyses
      tags: [intelligence]
      summary: List all saved AI analyses for a property (newest first)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PropertyAiAnalysis"

  /properties/{id}/analyses/latest:
    get:
      operationId: getLatestPropertyAnalysis
      tags: [intelligence]
      summary: Get the most recent AI analysis for a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest analysis with isStale flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyAiAnalysis"
        "404":
          description: No analysis found

  /properties/{id}/analyses/compare:
    get:
      operationId: comparePropertyAnalyses
      tags: [intelligence]
      summary: Compare two analysis versions side-by-side
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: v1
          in: query
          required: true
          schema:
            type: integer
          description: First version number to compare
        - name: v2
          in: query
          required: true
          schema:
            type: integer
          description: Second version number to compare
      responses:
        "200":
          description: Two analysis versions for comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyAnalysisComparison"
        "404":
          description: One or both versions not found

  /properties/{id}/set-active:
    put:
      operationId: setPropertyActive
      tags: [properties]
      summary: Set a property as the active project property, sync financials, and create decision log entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"

  /properties/{id}/confirm-upload:
    post:
      operationId: confirmPropertyUpload
      tags: [intelligence]
      summary: Save reviewed extracted property data and store document reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmUploadBody"
      responses:
        "200":
          description: Updated property with media file stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicProperty"

  /properties/{id}/advisor-action:
    post:
      operationId: propertyAdvisorAction
      tags: [intelligence]
      summary: Run an AI advisor action for a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvisorActionBody"
      responses:
        "200":
          description: AI advisor response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorActionResult"

  /projects/{projectId}/scoring-weights:
    get:
      operationId: getProjectScoringWeights
      tags: [properties]
      summary: Get project-level scoring weight presets used in property ranking
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current scoring weights (or defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringWeights"
    put:
      operationId: updateProjectScoringWeights
      tags: [properties]
      summary: Update project-level scoring weight presets
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoringWeights"
      responses:
        "200":
          description: Updated scoring weights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringWeights"

  /projects/{projectId}/properties/import-url:
    post:
      operationId: importPropertyFromUrl
      tags: [intelligence]
      summary: Extract property data from a commercial listing URL for review
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
              required:
                - url
      responses:
        "200":
          description: Extracted property data for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUrlResult"
        "422":
          description: Could not fetch or extract from URL

  /projects/{projectId}/properties/ranking:
    get:
      operationId: getPropertyRanking
      tags: [properties]
      summary: Get AI-scored property rankings for all non-rejected properties
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [overall, safest, highest-revenue, premium-brand, lowest-risk, fastest-launch]
            default: overall
      responses:
        "200":
          description: Ranked property list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyRankingResult"

  /projects/{projectId}/phases-with-tasks:
    get:
      operationId: getPhasesWithTasks
      tags: [phases]
      summary: Get all phases with their tasks for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phases with tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhaseWithTasks"

  /projects/{projectId}/cashflow:
    get:
      operationId: getProjectCashflow
      tags: [financials]
      summary: Get monthly cashflow projection for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: scenario
          in: query
          required: false
          schema:
            type: string
            enum: [conservative, realistic, aggressive]
      responses:
        "200":
          description: Monthly cashflow data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashflowMonth"

