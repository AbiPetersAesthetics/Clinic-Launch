  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        targetLocation:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        targetOpeningDate:
          type: string
          nullable: true
        status:
